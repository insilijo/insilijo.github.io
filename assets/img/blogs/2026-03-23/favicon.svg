<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>

  <!-- Flask body (trapezoid lower half) -->
  <path d="M11 19 L8 26 Q7.5 27.5 9 27.5 H23 Q24.5 27.5 24 26 L21 19 Z"
        fill="white" fill-opacity="0.95"/>

  <!-- Flask neck / upper stem -->
  <rect x="13" y="7" width="6" height="12" rx="1" fill="white" fill-opacity="0.95"/>

  <!-- Flask rim -->
  <rect x="11.5" y="6" width="9" height="2.5" rx="1.25" fill="white"/>

  <!-- Bubbles in flask body -->
  <circle cx="13" cy="23" r="1.2" fill="#4f46e5" opacity="0.7"/>
  <circle cx="18" cy="25" r="0.9" fill="#4f46e5" opacity="0.5"/>
  <circle cx="15.5" cy="24.5" r="0.7" fill="#4f46e5" opacity="0.4"/>
</svg>
